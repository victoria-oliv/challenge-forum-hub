version: '3.9'

services:
  api:
    build: .
    container_name: forum-hub-api
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-forum_hub_prod_secret_mude_isso}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-2h}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
